slam_toolbox:
  ros__parameters:
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI

    # Topics / frames
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_sim_time: false

    # ── MEMORY CRITICAL ──────────────────────────────────────────────
    max_laser_range: 10.0          # your lidar does 12m, stay conservative
    resolution: 0.05
    map_update_interval: 2.0       # less frequent = less memory churn
    max_queue_size: 2              # default is huge, causes OOM

    # Performance
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.1
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # Loop closure (disable to save CPU/RAM while debugging)
    do_loop_closing: true