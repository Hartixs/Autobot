<script>
const API = '/api';
let captureCount = 0;

setInterval(() => { document.getElementById('timeBadge').textContent = new Date().toLocaleTimeString(); }, 1000);

async function pollStatus() {
  try {
    const r = await fetch(`${API}/status`);
    const d = await r.json();

    const badge = document.getElementById('mqttBadge');
    const label = document.getElementById('mqttLabel');
    if (d.mqtt_connected) { badge.classList.remove('offline'); label.textContent = 'MQTT Connected'; }
    else { badge.classList.add('offline'); label.textContent = 'MQTT Offline'; }

    // IMU
    document.getElementById('imu-orx').textContent  = d.imu.or_x.toFixed(3);
    document.getElementById('imu-ory').textContent  = d.imu.or_y.toFixed(3);
    document.getElementById('imu-orz').textContent  = d.imu.or_z.toFixed(3);
    document.getElementById('imu-angz').textContent = d.imu.ang_z.toFixed(3);
    document.getElementById('imu-linx').textContent = d.imu.lin_x.toFixed(3);
    document.getElementById('imu-liny').textContent = d.imu.lin_y.toFixed(3);

    // Cmd vel
    document.getElementById('vel-lx').textContent = d.cmd_vel.linear_x.toFixed(3);
    document.getElementById('vel-ly').textContent = d.cmd_vel.linear_y.toFixed(3);
    document.getElementById('vel-az').textContent = d.cmd_vel.angular_z.toFixed(3);

    // ETA
    if (d.eta.seconds > 0) {
      const m = Math.floor(d.eta.seconds / 60); const s = d.eta.seconds % 60;
      document.getElementById('eta-val').textContent = `${m}:${String(s).padStart(2,'0')}`;
      document.getElementById('eta-method').textContent = `Method: ${d.eta.method}`;
    }
    document.getElementById('lastPoll').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('mqttBadge').classList.add('offline');
    document.getElementById('mqttLabel').textContent = 'Backend Offline';
  }
}
setInterval(pollStatus, 1500); pollStatus();

async function startTask(taskNum) {
  const status = document.getElementById('stopStatus');
  status.textContent = `Triggering Task ${taskNum} on Pi...`;
  status.className = 'stop-status';
  try {
    const r = await fetch(`${API}/play_bag`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task: taskNum })
    });
    const d = await r.json();
    if (d.error) { status.textContent = `❌ ${d.error}`; status.className = 'stop-status sent'; }
    else { status.textContent = `✅ ${d.status}`; status.style.color = 'var(--accent2)'; }
  } catch(e) {
    status.textContent = '❌ Cannot reach Pi backend.'; status.className = 'stop-status sent';
  }
  setTimeout(() => { status.textContent = ''; status.className = 'stop-status'; status.style.color = ''; }, 4000);
}

async function captureImage() {
  const btn = document.getElementById('captureBtn'), spin = document.getElementById('capSpinner'), txt = document.getElementById('capBtnText');
  btn.disabled = true; spin.style.display = 'block'; txt.textContent = 'Scanning…';
  try {
    const r = await fetch(`${API}/capture`, { method: 'POST' });
    const d = await r.json();
    if (d.error) { showAlert('❌ ' + d.error, '#fee2e2', '#b91c1c'); }
    else {
      if (d.image_b64) {
        const img = document.getElementById('previewImg');
        img.src = `data:image/jpeg;base64,${d.image_b64}`; img.style.display = 'block';
        document.getElementById('previewPlaceholder').style.display = 'none';
      }
      const isBlack = d.color === 'black';
      document.getElementById('res-color').innerHTML = `<span class="pill ${isBlack ? 'pill-black' : 'pill-notblack'}">${d.color.toUpperCase()}</span>`;
      document.getElementById('res-rack').innerHTML = `<span class="pill ${d.rack === 'Rack 1' ? 'pill-rack1' : 'pill-rack4'}">${d.rack}</span>`;
      document.getElementById('res-brightness').textContent = d.mean_brightness;
      document.getElementById('res-bbox1').textContent = `(${d.bbox.x1}, ${d.bbox.y1}) to (${d.bbox.x2}, ${d.bbox.y2})`;
      captureCount++; document.getElementById('capCount').textContent = captureCount;
      showAlert(`✅ ${d.color.toUpperCase()} detected → ${d.rack}`, isBlack ? '#f1f5f9' : '#fef9c3', isBlack ? '#1e293b' : '#92400e');
    }
  } catch(e) { showAlert('❌ Cannot reach backend.', '#fee2e2', '#b91c1c'); }
  btn.disabled = false; spin.style.display = 'none'; txt.textContent = '📷 Capture & Detect Color';
}

async function sendStop() {
  const btn = document.getElementById('stopBtn'), status = document.getElementById('stopStatus');
  btn.disabled = true; status.textContent = 'Executing sudo pkill on Pi...'; status.className = 'stop-status';
  try {
    const r = await fetch(`${API}/stop`, { method: 'POST' });
    const d = await r.json();
    if(d.error) { status.textContent = '❌ Error: check sudo permissions'; status.className = 'stop-status sent'; }
    else { status.textContent = '⛔ ROS Processes Killed!'; status.className = 'stop-status sent'; }
  } catch(e) { status.textContent = 'Backend offline.'; status.className = 'stop-status sent'; }
  setTimeout(() => { btn.disabled = false; status.textContent = ''; status.className = 'stop-status'; }, 4000);
}

function showAlert(msg, bg, color) {
  const el = document.getElementById('detectionAlert');
  el.textContent = msg; el.style.background = bg; el.style.color = color; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}
</script>

  /* ── Data Rows ──────────────────────────────── */
  .data-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #eef0f4; }

  /* ── Controls ───────────────────────────────── */
  .task-btn {
    flex: 1; padding: 12px; background: var(--surface); color: var(--accent); border: 2px solid var(--accent);
    border-radius: 8px; font-weight: bold; cursor: pointer; transition: all .2s;
  }

  .stop-btn {

  }

  /* ── Camera & Detection ─────────────────────── */
  .cam-card { grid-column: 3; grid-row: 1 / 3; display: flex; flex-direction: column; }
  .video-container {
    width: 100%; background: #000; border-radius: 8px; overflow: hidden; position: relative;
    aspect-ratio: 4/3; margin-bottom: 15px; border: 2px solid var(--border);
  }
  #previewVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  .crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 60px; height: 60px; border: 2px dashed rgba(255, 255, 255, 0.8); pointer-events: none;
    border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
  }
  .capture-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #fff; font-size: 1rem;
    font-weight: 700; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .2s;
  }
  .capture-btn:hover { background: #1d4ed8; }
  .detection-result { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-top: 15px; flex: 1; }

  .pill-black { background: #1e293b; color: #fff; }
  .pill-notblack { background: #fef3c7; color: #92400e; }

  .pill-rack4 { background: #d1fae5; color: #065f46; }

  .path-card { grid-column: 1 / 3; grid-row: 2; }

  @media (max-width: 1024px) { .main { grid-template-columns: 1fr 1fr; } .cam-card { grid-column: 1 / 3; grid-row: 3; } }
  @media (max-width: 600px) { .main { grid-template-columns: 1fr; } .path-card, .cam-card, .stop-card { grid-column: 1; } }

  </div>
</header>

<div class="main">

    </div>

    </div>

      Dead Reckoning Map

<script>
// --- Clock ---
setInterval(() => { document.getElementById('timeBadge').textContent = new Date().toLocaleTimeString(); }, 1000);

// --- Laptop Camera Setup ---
const video = document.getElementById('previewVideo');
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
  .then(stream => { video.srcObject = stream; })
  .catch(err => {
    navigator.mediaDevices.getUserMedia({ video: true }) // Fallback to any cam
      .then(stream => { video.srcObject = stream; })
      .catch(e => console.error("Camera denied:", e));
  });

function captureImageLocal() {
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Sample center area (60x60 square matching crosshair)
  const cx = canvas.width / 2; const cy = canvas.height / 2;
  const imgData = ctx.getImageData(cx - 30, cy - 30, 60, 60);
  let totalBrightness = 0;
  for(let i=0; i<imgData.data.length; i+=4) {
      // Perceived brightness formula
      totalBrightness += (0.299*imgData.data[i] + 0.587*imgData.data[i+1] + 0.114*imgData.data[i+2]);
  }
  const meanBrightness = totalBrightness / (60 * 60);
  const isBlack = meanBrightness < 65; // Threshold
  
  const colorStr = isBlack ? 'black' : 'color/light';
  const rackStr  = isBlack ? 'Rack 1' : 'Rack 4';

  document.getElementById('res-color').innerHTML = `<span class="pill ${isBlack ? 'pill-black' : 'pill-notblack'}">${colorStr.toUpperCase()}</span>`;
  document.getElementById('res-rack').innerHTML = `<span class="pill ${isBlack ? 'pill-rack1' : 'pill-rack4'}">${rackStr}</span>`;
  document.getElementById('res-brightness').textContent = meanBrightness.toFixed(1);

  const alertBox = document.getElementById('detectionAlert');
  alertBox.textContent = `✅ Result: ${colorStr.toUpperCase()} -> ${rackStr}`;
  alertBox.style.background = isBlack ? '#f1f5f9' : '#fef9c3';
  alertBox.style.color = isBlack ? '#1e293b' : '#92400e';
  alertBox.style.display = 'block';
  setTimeout(() => alertBox.style.display = 'none', 5000);
}

// --- Path Visualization ---
const pCanvas = document.getElementById('pathCanvas');
const pCtx = pCanvas.getContext('2d');
let robotPose = { x: 0, y: 0, theta: 0 };
let pathHistory = [];
let currentVx = 0, currentWz = 0;

function resizeCanvas() {
  pCanvas.width = pCanvas.parentElement.clientWidth;
  pCanvas.height = 300;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function resetPath() {
  robotPose = { x: 0, y: 0, theta: 0 };
  pathHistory = [];
}

let lastFrameTime = performance.now();
function animatePath(time) {
  let dt = (time - lastFrameTime) / 1000;
  lastFrameTime = time;

  // Integrate Velocity (Dead Reckoning)
  if (Math.abs(currentVx) > 0.01 || Math.abs(currentWz) > 0.01) {
    robotPose.theta += currentWz * dt;
    // Scale factor = 40 pixels per meter
    robotPose.x += (currentVx * Math.cos(robotPose.theta)) * 40 * dt;
    robotPose.y -= (currentVx * Math.sin(robotPose.theta)) * 40 * dt; // Canvas Y is inverted
    
    // Save history point every frame we move
    pathHistory.push({x: robotPose.x, y: robotPose.y});
    if(pathHistory.length > 800) pathHistory.shift(); // Max trail length
    
    document.getElementById('poseOverlay').textContent = 
      `X: ${(robotPose.x/40).toFixed(2)}m | Y: ${(-robotPose.y/40).toFixed(2)}m | Θ: ${((robotPose.theta*180)/Math.PI % 360).toFixed(1)}°`;
  }

  // Draw Scene
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  const cx = pCanvas.width / 2;
  const cy = pCanvas.height / 2;

  // Grid
  pCtx.strokeStyle = 'rgba(255,255,255,0.05)';
  pCtx.lineWidth = 1;
  for(let i=0; i<pCanvas.width; i+=20) { pCtx.beginPath(); pCtx.moveTo(i,0); pCtx.lineTo(i,pCanvas.height); pCtx.stroke(); }
  for(let i=0; i<pCanvas.height; i+=20) { pCtx.beginPath(); pCtx.moveTo(0,i); pCtx.lineTo(pCanvas.width,i); pCtx.stroke(); }

  // Draw Path Trail
  pCtx.strokeStyle = '#38bdf8'; // Glowing Blue
  pCtx.lineWidth = 3;
  pCtx.lineCap = 'round';
  pCtx.lineJoin = 'round';
  pCtx.beginPath();
  pathHistory.forEach((p, idx) => {
    let px = cx + p.x; let py = cy + p.y;
    if(idx === 0) pCtx.moveTo(px, py); else pCtx.lineTo(px, py);
  });
  pCtx.stroke();

  // Draw Robot Dot
  let rx = cx + robotPose.x; let ry = cy + robotPose.y;
  pCtx.fillStyle = '#ef4444'; // Red
  pCtx.beginPath(); pCtx.arc(rx, ry, 6, 0, Math.PI*2); pCtx.fill();
  // Draw Heading Line
  pCtx.strokeStyle = '#fff'; pCtx.lineWidth = 2;
  pCtx.beginPath(); pCtx.moveTo(rx, ry); pCtx.lineTo(rx + Math.cos(robotPose.theta)*12, ry - Math.sin(robotPose.theta)*12); pCtx.stroke();

  requestAnimationFrame(animatePath);
}
requestAnimationFrame(animatePath);

// --- API Polling & Control ---
const API = '/api';
async function pollStatus() {
  try {
    const r = await fetch(`${API}/status`);
    const d = await r.json();

    // Update variables for smooth animation loop
    currentVx = d.cmd_vel.linear_x;
    currentWz = d.cmd_vel.angular_z;

    // Telemetry UI
    document.getElementById('vel-lx').textContent = currentVx.toFixed(3);
    document.getElementById('vel-az').textContent = currentWz.toFixed(3);
    document.getElementById('imu-orz').textContent = d.imu.or_z.toFixed(3);

    // ETA
    if (d.eta.seconds > 0) {
      const m = Math.floor(d.eta.seconds / 60); const s = d.eta.seconds % 60;
      document.getElementById('eta-val').textContent = `${m}:${String(s).padStart(2,'0')}`;
      document.getElementById('eta-method').textContent = `Method: ${d.eta.method}`;
    }
  } catch(e) { console.log("Backend offline"); }
}
setInterval(pollStatus, 1500); pollStatus();

async function startTask(taskNum) {
  const status = document.getElementById('stopStatus');
  status.textContent = `Triggering Task ${taskNum}...`;
  resetPath();
  try {
    await fetch(`${API}/play_bag`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task: taskNum }) });
    status.textContent = `✅ Bag ${taskNum} Executed`; status.style.color = 'var(--accent2)';
  } catch(e) { status.textContent = '❌ API Error'; }
  setTimeout(() => { status.textContent = ''; status.style.color = 'var(--muted)'; }, 3000);
}

async function sendStop() {
  const status = document.getElementById('stopStatus');
  status.textContent = 'Executing Stop...'; currentVx = 0; currentWz = 0;
  try {
    await fetch(`${API}/stop`, { method: 'POST' });
    status.textContent = '⛔ STOPPED!'; status.style.color = 'var(--danger)';

      <button onclick="pathHistory=[]" style="position:absolute; bottom:10px; right:10px; cursor:pointer; background:rgba(255,255,255,0.2); color:#fff; border:none; padding:5px 10px; border-radius:4px;">Clear Map</button>

<script>
// --- Camera Setup ---
const video = document.getElementById('previewVideo');
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => { video.srcObject = stream; })
  .catch(err => { alert("Camera Blocked! Make sure URL starts with https://"); console.error(err); });

function captureImageLocal() {
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2; const cy = canvas.height / 2;
  const imgData = ctx.getImageData(cx - 30, cy - 30, 60, 60);
  let totalB = 0;
  for(let i=0; i<imgData.data.length; i+=4) {
      totalB += (0.299*imgData.data[i] + 0.587*imgData.data[i+1] + 0.114*imgData.data[i+2]);
  }
  const meanB = totalB / 3600;
  const isBlack = meanB < 65; 
  
  const alertBox = document.getElementById('detectionAlert');
  alertBox.innerHTML = isBlack ? `✅ BLACK DETECTED -> RACK 1 <br><span style="font-size:0.8rem;font-weight:normal">(Brightness: ${meanB.toFixed(1)})</span>` 
                               : `✅ COLOR DETECTED -> RACK 4 <br><span style="font-size:0.8rem;font-weight:normal">(Brightness: ${meanB.toFixed(1)})</span>`;
  alertBox.style.background = isBlack ? '#1e293b' : '#fef9c3';
  alertBox.style.color = isBlack ? '#fff' : '#92400e';
  alertBox.style.display = 'block';
}

// --- Odometry Path Map ---
const pCanvas = document.getElementById('pathCanvas');
const pCtx = pCanvas.getContext('2d');
let pathHistory = [];
let robotPose = {x:0, y:0, theta:0};

function resizeCanvas() {
  pCanvas.width = pCanvas.parentElement.clientWidth;
  pCanvas.height = 300;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawScene() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  const cx = pCanvas.width / 2; const cy = pCanvas.height / 2;

  // Grid
  pCtx.strokeStyle = 'rgba(255,255,255,0.05)'; pCtx.lineWidth = 1;
  for(let i=0; i<pCanvas.width; i+=20) { pCtx.beginPath(); pCtx.moveTo(i,0); pCtx.lineTo(i,pCanvas.height); pCtx.stroke(); }
  for(let i=0; i<pCanvas.height; i+=20) { pCtx.beginPath(); pCtx.moveTo(0,i); pCtx.lineTo(pCanvas.width,i); pCtx.stroke(); }

  // Draw Path Trail
  pCtx.strokeStyle = '#38bdf8'; pCtx.lineWidth = 3; pCtx.lineCap = 'round'; pCtx.lineJoin = 'round';
  pCtx.beginPath();
  pathHistory.forEach((p, idx) => {
    let px = cx + (p.x * 40); // 40 pixels per meter
    let py = cy - (p.y * 40); // Canvas Y is inverted
    if(idx === 0) pCtx.moveTo(px, py); else pCtx.lineTo(px, py);
  });
  pCtx.stroke();

  // Draw Robot Dot
  let rx = cx + (robotPose.x * 40); let ry = cy - (robotPose.y * 40);
  pCtx.fillStyle = '#ef4444'; pCtx.beginPath(); pCtx.arc(rx, ry, 6, 0, Math.PI*2); pCtx.fill();
  pCtx.strokeStyle = '#fff'; pCtx.lineWidth = 2; pCtx.beginPath(); pCtx.moveTo(rx, ry); pCtx.lineTo(rx + Math.cos(robotPose.theta)*12, ry - Math.sin(robotPose.theta)*12); pCtx.stroke();
}

// --- API Polling ---
async function pollStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();

    document.getElementById('vel-lx').textContent = d.cmd_vel.linear_x.toFixed(3);
    document.getElementById('vel-az').textContent = d.cmd_vel.angular_z.toFixed(3);

    // Update Odom
    robotPose.x = d.odom.position.x;
    robotPose.y = d.odom.position.y;
    
    // Quaternion to Yaw (Theta)
    let q = d.odom.orientation;
    robotPose.theta = Math.atan2(2 * (q.w * q.z + q.x * q.y), 1 - 2 * (q.y * q.y + q.z * q.z));

    document.getElementById('poseOverlay').textContent = `X: ${robotPose.x.toFixed(2)}m | Y: ${robotPose.y.toFixed(2)}m | Θ: ${((robotPose.theta*180)/Math.PI % 360).toFixed(1)}°`;

    // Only save history if it moved
    let last_p = pathHistory[pathHistory.length - 1];
    if (!last_p || Math.hypot(last_p.x - robotPose.x, last_p.y - robotPose.y) > 0.05) {
        pathHistory.push({x: robotPose.x, y: robotPose.y});
        if(pathHistory.length > 500) pathHistory.shift();
    }
    
    drawScene();
  } catch(e) {}
}
setInterval(pollStatus, 250); // Fast 4Hz polling for smooth map updates

// --- Commands ---
async function startTask(num) {
  const s = document.getElementById('stopStatus'); s.textContent = `Starting path ${num}...`; pathHistory = [];
  try { await fetch('/api/play_bag', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task: num }) }); s.textContent = `✅ Path ${num} running`; } 
  catch(e) { s.textContent = '❌ API Error'; }
}
async function sendStop() {
  const s = document.getElementById('stopStatus'); s.textContent = 'Stopping...';
  try { await fetch('/api/stop', { method: 'POST' }); s.textContent = '⛔ STOPPED!'; s.style.color = 'var(--danger)'; } 
  catch(e) { s.textContent = '❌ API Error'; }
}
</script>
